<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Calculator</title>
<style>
h1 {
  font-family: "Brush Script MT", cursive;
  font-size: 50px;
  margin-top: 0px; 
  margin-bottom: 0px; 
}
body {
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
  text-align: center;
  font-size: 20px; 
}
input { 
  text-align: center; 
  margin: 5px 0; 
  width: 250px; 
  padding: 8px;
  border-radius: 10px;
  font-size: 20px; 
  border: 2px solid #ccc;
}
input:focus {
  border-color: #007BFF;
  outline: none;
}
.number-pad {
  display: flex;
  flex-direction: column;
  width: 300px;
  margin-top: 10px;
}
.pad-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0px;
}
.number-pad button {
  flex: 1;
  margin: 2px;
  padding: 15px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background-color: #f0f0f0;
}
.number-pad button:active {
  background-color: #d0d0d0;
}
.quote { 
  margin-top: 10px; 
  font-weight: bold; 
  font-size: 23px;
}
.breakdown { 
  margin-top: 10px; 
  font-weight: bold; 
  font-size: 20px; 
}
.value {
  color: #007BFF;
}
</style>
</head>
<body>

<h1>Quote Calculator</h1>

<!-- Input fields -->
<input type="text" id="items" placeholder="Number of Items" readonly>
<input type="text" id="distance" placeholder="Distance (kms)" readonly>

<div class="breakdown" id="breakdown"></div>
<div class="quote" id="quote"></div>

<!-- Number Pad -->
<div class="number-pad">
  <div class="pad-row">
    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
  </div>
  <div class="pad-row">
    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>
  </div>
  <div class="pad-row">
    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
  </div>
  <div class="pad-row">
    <button id="delete">Delete</button>
    <button class="num">0</button>
    <button id="next">Next</button>
  </div>
  <div class="pad-row">
    <button id="clear">Clear</button>
    <button id="clear-all">Clear All</button>
  </div>
</div>

<script>
let inputs = [
  document.getElementById('items'),
  document.getElementById('distance')
];
let currentInputIndex = 0;

// Let clicking on inputs switch focus without opening phone keyboard
inputs.forEach((inp, idx) => {
    inp.addEventListener('click', () => {
        currentInputIndex = idx;
        updateFocus();
    });
});

// Highlight current input
function updateFocus() {
    inputs.forEach((inp, idx) => {
        inp.style.borderColor = idx === currentInputIndex ? "#007BFF" : "#ccc";
    });
}

// Function to calculate quote
function calculateQuote() {
  let items = parseInt(inputs[0].value) || 0;
  let distance = parseInt(inputs[1].value) || 0;

  let base = items * 10;
  let distanceCost = distance * 2;
  let total = base + distanceCost;
  let time = (items * 0.5) + distance

  // New logic for employees and trailer size
  let employees = items >= 50 ? 3 : 2;
  let trailer = items >= 50 ? "Large" : "Medium";

  document.getElementById('breakdown').innerHTML =
      "Employees needed: " + employees + "<br>" +
      "Trailer size: " + trailer + "<br>" +
      "Cost for items: $" + base + "<br>" +
      "Cost for distance: $" + distanceCost;

  document.getElementById('quote').innerHTML =
      "Total Quote: $" + total + "<br>" +
      "Total Time: " + time + "mins";
}

// Number pad input
document.querySelectorAll('.num').forEach(btn => {
    btn.addEventListener('click', () => {
        let input = inputs[currentInputIndex];
        input.value += btn.textContent;
        calculateQuote();
    });
});

// Next button
document.getElementById('next').addEventListener('click', () => {
    currentInputIndex = (currentInputIndex + 1) % inputs.length;
    updateFocus();
});

// Delete button
document.getElementById('delete').addEventListener('click', () => {
    let input = inputs[currentInputIndex];
    input.value = input.value.slice(0, -1); // Remove last character
    calculateQuote();
});

// Clear button
document.getElementById('clear').addEventListener('click', () => {
    inputs[currentInputIndex].value = '';
    calculateQuote();
});

// Clear all button
document.getElementById('clear-all').addEventListener('click', () => {
    inputs.forEach(input => input.value = '');
    calculateQuote();
});

// Initialize
calculateQuote();
updateFocus();
</script>

</body>
</html>
