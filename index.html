<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Calculator</title>
<style>
h1 {
  font-family: "Brush Script MT", cursive;
  font-size: 45px;
  margin-top: 0px; 
  margin-bottom: 5px; 
}
body {
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
  text-align: center;
  font-size: 20px; 
}
input, select, button { 
  text-align: center; 
  width: 250px; 
  padding: 5px;
  border-radius: 10px;
  font-size: 20px; 
  border: 2px solid #ccc;
}
input:focus, select:focus {
  border-color: #007BFF;
  outline: none;
}
button {
  cursor: pointer;
}
.quote { 
  margin-top: 10px; 
  font-weight: bold; 
  font-size: 23px;
}
.breakdown { 
  margin-top: 10px; 
  font-weight: bold; 
  font-size: 20px; 
}
#items-list {
  margin-top: 0px;
}
</style>
</head>
<body>

<h1>Quote Calculator</h1>

<!-- Item input container -->
<div id="item-inputs" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 0px; position: relative; max-width: 300px; margin: 0 auto;">
  <!-- Item selection -->
  <input type="text" id="item-select" placeholder="Select item" autocomplete="off">

  <!-- Dropdown -->
  <div id="dropdown" style="position: absolute; top: 38px; left: 0; right: 0; background: #fff; border: 1px solid #ccc; max-height: 120px; overflow-y: auto; display: none; z-index: 100;"></div>

  <!-- Quantity and Add button -->
  <div style="display: flex; gap: 5px; justify-content: center;">
    <input type="number" id="item-quantity" placeholder="#" min="1" style="flex: 1; margin-bottom: 5px; max-width: 60px;">
    <button id="add-item" style="flex: 1; max-width: 60px; margin-bottom: 5px;">Add</button>
  </div>
</div>

<!-- Display added items -->
<div id="items-list"></div>

<div id="totals" style="margin-top: 10px; font-weight: bold;">
  Total Cubic Feet: 0 <br> Total Time: 00:00
</div>



<script>
  let itemsData = {};
  let itemsList = [];   

  // Small helper to parse CSV lines safely (handles quotes & commas properly)
  function parseCSVLine(line) {
    const regex = /(".*?"|[^",]+)(?=\s*,|\s*$)/g;
    return [...line.matchAll(regex)].map(m => m[0].replace(/^"|"$/g, '').trim());
  }

  async function loadItemsFromSheet() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmHm6gYdE4Yq2s8g3IOSlBLXnhvzuNrMUHHKKkv1Xd726V8q69md4W4tjbD6xZ2YM8tMy0smjG7bSy/pub?gid=0&single=true&output=csv";

    try {
      const response = await fetch(url);
      const csvText = await response.text();

      const lines = csvText.split('\n').filter(line => line.trim() !== '');

      itemsData = {};
      itemsList = [];

      lines.slice(1).forEach(line => { // Skip header row
        const cols = parseCSVLine(line).slice(0, 3); // Only first 3 columns
        const [name, cubicFeet, time] = cols;

        if (name && cubicFeet && time) {
          itemsData[name] = { cubicFeet: parseFloat(cubicFeet), time: parseInt(time) };
          itemsList.push(name);
        }
      });

      console.log('✅ Items loaded from sheet:', itemsData, itemsList);
      updateItemsList();
      calculateQuote();
    } catch (err) {
      console.error('❌ Error loading items from sheet:', err);
    }
  }

  loadItemsFromSheet();

  let selectedItems = [];

  const searchInput = document.getElementById("item-select");
  const dropdown = document.getElementById("dropdown");

  // Show filtered dropdown as user types
  searchInput.addEventListener("input", () => {
    const val = searchInput.value.toLowerCase();
    dropdown.innerHTML = "";
    if(val === ""){
      dropdown.style.display = "none";
      return;
    }
    const filtered = itemsList.filter(i => i.toLowerCase().includes(val));
    filtered.forEach(item => {
      const div = document.createElement("div");
      div.textContent = item;
      div.style.padding = "5px";
      div.style.cursor = "pointer";
      div.addEventListener("click", () => {
        searchInput.value = item;
        dropdown.style.display = "none";
      });
      dropdown.appendChild(div);
    });
    dropdown.style.display = filtered.length ? "block" : "none";
  });

  // Hide dropdown when clicking outside
  document.addEventListener("click", (e) => {
    if(!searchInput.contains(e.target) && !dropdown.contains(e.target)){
      dropdown.style.display = "none";
    }
  });

  document.getElementById("add-item").addEventListener("click", () => {
    let itemName = searchInput.value.trim();
    let quantity = parseInt(document.getElementById("item-quantity").value) || 0;

    if(quantity > 0 && itemsData[itemName]) { // ensure item exists
      let existing = selectedItems.find(i => i.name === itemName);
      if(existing){
        existing.quantity += quantity;
      } else {
        selectedItems.push({ name: itemName, quantity: quantity });
      }
      document.getElementById("item-quantity").value = '';
      searchInput.value = '';
      updateItemsList();
      calculateQuote();
    }
  });

  function updateItemsList(){
    const listDiv = document.getElementById("items-list");
    listDiv.innerHTML = "<strong>Selected Items:</strong><br>";

    selectedItems.forEach((item, index) => {
      const itemDiv = document.createElement("div");
      itemDiv.style.display = "flex";
      itemDiv.style.justifyContent = "center";
      itemDiv.style.alignItems = "center";
      itemDiv.style.gap = "10px";

      const text = document.createElement("span");
      text.textContent = `${item.name} x${item.quantity}`;

      const removeBtn = document.createElement("button");
      removeBtn.textContent = "Remove";
      removeBtn.style.padding = "0px 0px";
      removeBtn.style.fontSize = "16px";
      removeBtn.style.width = "80px"
      removeBtn.addEventListener("click", () => {
        selectedItems.splice(index, 1);
        updateItemsList();
        calculateQuote();
      });

      itemDiv.appendChild(text);
      itemDiv.appendChild(removeBtn);
      listDiv.appendChild(itemDiv);
    });
  }

  function formatTime(totalMinutes) {
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
  }

  function calculateQuote() {
    let totalCuFt = 0, totalTime = 0;
    selectedItems.forEach(i => {
      totalCuFt += itemsData[i.name].cubicFeet * i.quantity;
      totalTime += itemsData[i.name].time * i.quantity;
    });

    const totalsDiv = document.getElementById("totals");
    totalsDiv.innerHTML = `Total Cubic Feet: ${totalCuFt} <br> Total Time: ${formatTime(totalTime)}`;
  }

  updateItemsList();
  calculateQuote();
</script>

</body>
</html>
